CONFIG_PRINTK=y
CONFIG_LOG=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_STATIC_INIT_GNU=y
# CONFIG_HW_STACK_PROTECTION=y
# C++ 支持
CONFIG_CPP=y
CONFIG_HEAP_MEM_POOL_SIZE=0
CONFIG_THREAD_NAME=n
# 标准库
CONFIG_NEWLIB_LIBC=y
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_MAX_NUM_UP_BUFFERS=1
CONFIG_SEGGER_RTT_MAX_NUM_DOWN_BUFFERS=1
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=1024
CONFIG_SEGGER_RTT_BUFFER_SIZE_DOWN=16

# enable console
CONFIG_CONSOLE=y
# CONFIG_UART_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_SHELL=n

CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_LOG_BACKEND_RTT_OUTPUT_BUFFER_SIZE=128
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_CAN=y 
# CONFIG_CAN_LOOPBACK=y

CONFIG_HXZP_CAN_PROTOCOL=y
CONFIG_HXZP_GEN_MOTOR=y
CONFIG_HXZP_UART_PROTOCOL=y

# LED Strip 驱动
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y

# SPI 驱动
CONFIG_SPI=y

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_DMA=y
CONFIG_DMA_STM32=y
